<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Store Test</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin:40px;
    background:#f5f5f5;
}

.container{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.1);
}

h1{
    margin-bottom:20px;
}

button{
    padding:8px 15px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.refresh-btn{
    background:#2196F3;
    color:white;
}

.buy-btn{
    background:#4CAF50;
    color:white;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th,td{
    border:1px solid #ddd;
    padding:10px;
    text-align:left;
}

th{
    background:#f0f0f0;
}

.status{
    margin-top:10px;
    color:#666;
}
</style>
</head>
<body>

<div class="container">

    <h1>รายการสินค้า</h1>

    <button class="refresh-btn" onclick="loadProducts()">
        โหลดข้อมูลใหม่
    </button>

    <p class="status" id="status">
        กำลังโหลด...
    </p>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>ชื่อสินค้า</th>
                <th>ราคา</th>
                <th>คงเหลือ</th>
                <th>หมวดหมู่</th>
                <th>จัดการ</th>
            </tr>
        </thead>

        <tbody id="productTable">

        </tbody>
    </table>

</div>

<script>

const API_URL =
    "http://localhost:5000/api/products";

async function loadProducts() {

    try {

        document.getElementById("status").innerText =
            "กำลังโหลดข้อมูล...";

        const response = await fetch(API_URL);

        if(!response.ok){
            throw new Error("โหลดข้อมูลไม่สำเร็จ");
        }

        const products = await response.json();

        const table =
            document.getElementById("productTable");

        table.innerHTML = "";

        products.forEach(product => {

            table.innerHTML += `
                <tr>
                    <td>${product.id}</td>
                    <td>${product.name}</td>
                    <td>${product.price} บาท</td>
                    <td>${product.stock}</td>
                    <td>${product.category_name || "-"}</td>
                    <td>
                        <button
                            class="buy-btn"
                            onclick="buyProduct(
                                ${product.id},
                                '${product.name}',
                                ${product.stock}
                            )"
                        >
                            ซื้อ
                        </button>
                    </td>
                </tr>
            `;
        });

        document.getElementById("status").innerText =
            `พบสินค้า ${products.length} รายการ`;

    } catch(error){

        console.error(error);

        document.getElementById("status").innerText =
            "ไม่สามารถเชื่อมต่อ API ได้";

        alert("โหลดข้อมูลไม่สำเร็จ");
    }
}

async function buyProduct(id,name,stock){

    if(stock <= 0){

        alert("สินค้าหมด");

        return;
    }

    const confirmBuy =
        confirm(`ต้องการซื้อ ${name} หรือไม่ ?`);

    if(!confirmBuy){
        return;
    }

    try{

        const response = await fetch(
            `http://localhost:5000/api/products/${id}/reduce-stock`,
            {
                method: "PATCH"
            }
        );

        const result = await response.json();

        alert(result.message);

        loadProducts();

    }catch(error){

        console.error(error);

        alert("เกิดข้อผิดพลาด");

    }
}

loadProducts();

</script>

</body>
</html>
